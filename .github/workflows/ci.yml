name: CI Two Ships Passing

on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Installer les dépendances
        run: npm ci

      - name: Linter
        run: npm run lint
        continue-on-error: true 

      - name: Tests Unitaires
        run: |
          npm test
          echo "::notice title=Tests Unitaires::Tous les tests unitaires mathématiques (Jest) sont passés avec succès !"
          echo "Tests Unitaires" >> $GITHUB_STEP_SUMMARY
          echo "Les tests sur \`vec3.js\` et \`math.js\` ont été validés." >> $GITHUB_STEP_SUMMARY

      - name: Tests Fonctionnels (Cypress)
        run: |
          npm run test:e2e
          echo "::notice title=Tests Fonctionnels::Les tests e2e Cypress ont validé le chargement du jeu !"
          echo "### 🎮 Tests Fonctionnels" >> $GITHUB_STEP_SUMMARY
          echo "Le moteur 3D (Canvas) s'affiche correctement sans erreur critique." >> $GITHUB_STEP_SUMMARY

      - name: Audit de sécurité des dépendances
        run: |
          npm audit
          echo "::notice title=Sécurité::L'audit des dépendances est terminé."
        continue-on-error: true

  deploy_pages:
    needs: build_and_test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances
        run: npm ci

      - name: Build du jeu
        run: npx vite build --base=/${{ github.event.repository.name }}/

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload de l'artefact (dossier dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish_docker:
    needs: build_and_test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write 
      
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Rendre le nom du dépôt en minuscules
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest